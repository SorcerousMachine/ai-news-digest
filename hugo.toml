baseURL = "https://digest.sorcerousmachine.com"
languageCode = "en-us"
title = "AI Digest"
buildFuture = true
timeZone = "UTC"

[params]
  description = "Daily AI industry digest. Automated collection and analysis."
  author = "AI Digest Pipeline"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

enableRobotsTXT = true

[outputs]
  home = ["HTML", "RSS", "ROBOTS"]

[outputFormats]
  [outputFormats.RSS]
    mediaType = "application/rss+xml"
    baseName = "feed"

[pagination]
  pagerSize = 30
