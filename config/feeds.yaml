arxiv:
  feeds:
    - "https://rss.arxiv.org/rss/cs.AI"
    - "https://rss.arxiv.org/rss/cs.CL"
    - "https://rss.arxiv.org/rss/cs.LG"
  keywords:
    high_signal:
      - "agent"
      - "agentic"
      - "orchestration"
      - "tool use"
      - "function calling"
      - "code generation"
      - "code synthesis"
      - "validation"
      - "verification"
      - "specification"
      - "decomposition"
      - "planning"
      - "benchmark"
      - "RLHF"
      - "RLAIF"
      - "reasoning"
      - "chain of thought"
      - "multi-agent"
      - "self-repair"
      - "self-correction"
      - "instruction following"
    moderate_signal:
      - "transformer"
      - "fine-tuning"
      - "retrieval"
      - "RAG"
      - "context window"
      - "long context"
      - "hallucination"
      - "evaluation"
      - "alignment"
      - "safety"
      - "scaling"
      - "distillation"
      - "quantization"
